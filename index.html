<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tanks Arena</title>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
</head>
<body>

<div class="menu-board" id="menu-board">
  <div class="menu-panel">
    <p class="eyebrow">Multiplayer arena</p>
    <h1>Tanks Arena</h1>
    <p class="menu-copy">Create a free-for-all battle or join one by UUID. Last tank standing wins.</p>
    <label class="field">
      <span>Nick</span>
      <input autocomplete="nickname" id="nick-input" maxlength="24" placeholder="Tank commander" type="text">
    </label>
    <div class="battle-grid">
      <label class="field">
        <span>Battle title</span>
        <input id="battle-title-input" maxlength="40" placeholder="Friday skirmish" type="text">
      </label>
      <label class="field compact">
        <span>Max players</span>
        <input id="max-players-input" max="16" min="2" type="number" value="4">
      </label>
    </div>
    <div class="menu-actions">
      <button class="primary" id="create-battle-button">Create battle</button>
      <button id="controls-button">Controls</button>
    </div>
    <label class="field join-field">
      <span>Battle UUID</span>
      <input id="battle-id-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" type="text">
    </label>
    <div class="menu-actions">
      <button id="join-battle-button">Join battle</button>
    </div>
    <div class="battle-status" id="battle-status">
      <span id="battle-status-text">No battle selected</span>
    </div>
    <div class="controls" id="controls-panel">
      <span>Move: W/A/S/D or arrows</span>
      <span>Mine: Shift</span>
      <span>Minimap: hold M</span>
    </div>
  </div>
</div>
<div class="wrapper">

  <canvas id="canvas-walls"></canvas>
  <canvas height="900" id="canvas" width="1200"></canvas>

  <div class="hud">
    <div class="hud-panel hp-panel">
      <span>HP</span>
      <div class="hp-meter">
        <div id="hp-fill"></div>
      </div>
      <strong id="hp-value">100</strong>
    </div>
    <div class="hud-panel">
      <span>Mine</span>
      <strong id="mine-status">Ready</strong>
    </div>
    <div class="hud-panel">
      <span>Players</span>
      <strong id="players-count">1</strong>
    </div>
  </div>

  <div class="game-over" id="game-over">
    <div class="game-over-panel">
      <h2>Tank disabled</h2>
      <button id="respawn-button">Respawn</button>
    </div>
  </div>

  <div id="info">
    <div class="message connected">Connected to the server</div>
    <div class="message error-connection">Error connecting to the server</div>
  </div>

  <div class="minimap">

    <div>
      <canvas id="canvas-walls-minimap"></canvas>
      <canvas id="canvas-minimap"></canvas>
    </div>

  </div>

  <div class="touch-controls">
    <div class="joystick">
      <div class="dot"></div>
    </div>

    <div class="actions">
      <button class="mine" id="touch-mine">Mine</button>
    </div>
  </div>
</div>

<script src="/src/main.ts" type="module"></script>
</body>
</html>
