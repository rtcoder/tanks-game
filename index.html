<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groundfire</title>
  <link rel="stylesheet" href="/src/client/styles/main.css">
  <link rel="stylesheet" href="/src/client/styles/pbar.css">
  <link rel="stylesheet" href="/src/client/styles/menu.css">
</head>
<body>
  <script type="module" src="/src/client/main.ts"></script>
  <div class="game-holder" id="gameHolder">
    <div class="header" id="menu">
      <div class="hero-copy" id="banner">
        <p class="eyebrow">Online armored maze combat</p>
        <h1>Groundfire</h1>
        <h2>Break line of sight, grab the powerups, and hold the arena until every other tank is wreckage.</h2>
      </div>
      <div class="online-menu">
        <div class="panel-heading">
          <strong>Battle room</strong>
          <span>Free-for-all</span>
        </div>
        <label>
          <span>Nick</span>
          <input id="nick-input" maxlength="24" placeholder="Tank commander" autocomplete="nickname">
        </label>
        <div class="online-grid">
          <label>
            <span>Battle title</span>
            <input id="battle-title-input" maxlength="40" placeholder="Groundfire room">
          </label>
          <label>
            <span>Max players</span>
            <input id="max-players-input" type="number" min="2" max="16" value="4">
          </label>
        </div>
        <button id="create-battle-button">Create battle</button>
        <label>
          <span>Battle UUID</span>
          <input id="battle-id-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </label>
        <button id="join-battle-button">Join battle</button>
        <p id="battle-status-text">Create or join a battle</p>
      </div>
    </div>

    <div class="container" id="scene-container">
      <div class="sub-container" id="player1-container">
        <div class="health" id="player1-health">
          <div class="health__text" id="player1-health-bar_text">Health</div>
          <div class="health__bar" id="player1-health-bar">
            <div class="health__bar__fill" id="player1-health-bar-fill"></div>
          </div>
          <div class="health__value" id="player1-health-value">100</div>
        </div>
        <div class="powerups" id="player1-powerups"></div>
        <div class="crosshair" id="player1-crosshair" aria-hidden="true">
          <div class="crosshair__reticle">
            <span class="crosshair__line crosshair__line--horizontal"></span>
            <span class="crosshair__line crosshair__line--vertical"></span>
            <span class="crosshair__dot"></span>
          </div>
          <div class="crosshair__pitch" id="player1-aim-pitch">0°</div>
        </div>
        <div class="banner win-banner" id="player1-win-banner" style="display: none;">
          <div class="banner_text"><h1>YOU WIN!</h1></div>
        </div>
        <div class="banner lose-banner" id="player1-lose-banner" style="display: none;">
          <div class="banner_text"><h1>YOU LOSE!</h1></div>
        </div>
      </div>
    </div>

    <div class="message message--replay" id="replayMessage">W/A/S/D or arrows to move - Q/E aim - Space to fire</div>
    <div class="message message--instructions hidden" id="instructions"></div>
  </div>
</body>
</html>
